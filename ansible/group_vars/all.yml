# Application settings
app_name: transcritor
app_dir: /root/transcritor
app_port: 8010

# GitHub repository
github_repo: https://github.com/wbrunovieira/TrancritorPythonObsidianWhisper.git
github_branch: main

# Whisper model (large-v3-turbo recomendado para produção)
whisper_model: large-v3-turbo

# API key (secret — definida em vault.yml)
api_key: "{{ vault_api_key }}"

# Logging
log_level: INFO
