services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: uvicorn transcritor.api.app:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "127.0.0.1:8010:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - transcriptions_data:/data/transcripts
      - audio_data:/data/audio
      - video_data:/data/video
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  bgutil:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped

  worker:
    build: .
    command: celery -A transcritor.workers.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
    depends_on:
      redis:
        condition: service_healthy
      bgutil:
        condition: service_started
    volumes:
      - whisper_models:/home/appuser/.cache/huggingface
      - transcriptions_data:/data/transcripts
      - audio_data:/data/audio
      - video_data:/data/video
      - ./config:/config
    restart: unless-stopped

  beat:
    build: .
    command: celery -A transcritor.workers.celery_app beat --loglevel=info
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  whisper_models:       # modelo Whisper persistido — não re-baixa entre deploys
  transcriptions_data:
  audio_data:
  video_data:
